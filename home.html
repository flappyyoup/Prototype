<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPawnShop</title>
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <header>
    <div class="navbar">
      <div class="search-container">
        <input type="text" placeholder="Search" />
        <span class="search-icon">🔍</span>
      </div>
      <nav>
        <a href="#">Home</a>
        <a href="#">Marketplace</a>
        <a href="#">Branch</a>
        <a href="#">About</a>
        <span class="cart-icon">🛒</span>
        <button class="logout">Logout</button>
      </nav>
    </div>
    <div class="hero">
      <div class="logo">
        <span class="pawn-icon">♟️</span>
        <h1>PawnShop</h1>
      </div>
      <button class="cta">SANGLA NOW ➜</button>
    </div>
  </header>

  <section class="items-section">
    <h2>ITEMS WE ACCEPT</h2>
    <div class="items">
      <div class="item">
        <img src="https://via.placeholder.com/100x100.png?text=Necklace" alt="Necklace" />
        <p>Necklace</p>
      </div>
      <div class="item">
        <img src="https://via.placeholder.com/100x100.png?text=Earrings" alt="Earrings" />
        <p>Earings</p>
      </div>
      <div class="item">
        <img src="https://via.placeholder.com/100x100.png?text=Ring" alt="Ring" />
        <p>Ring</p>
      </div>
      <div class="item">
        <img src="https://via.placeholder.com/100x100.png?text=Watch" alt="Watch" />
        <p>Watch</p>
      </div>
    </div>
  </section>
</body>
</html>
